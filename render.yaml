# Render Blueprint — single Web Service (Express API + React build + Socket.IO)
# Docs: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: letzchat
    runtime: node
    plan: free
    buildCommand: npm run build
    startCommand: npm start
    healthCheckPath: /ping
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URL
        sync: false
      - key: CLIENT_ORIGIN
        sync: false
      - key: SERVER_URL
        sync: false
      - key: REACT_APP_LOCALHOST_KEY
        value: chat-app-current-user
      # REQUIRED: set this to your Render service URL, e.g. https://letzchat.onrender.com
      # This is baked into the React bundle at build time so the frontend calls the correct API
      - key: REACT_APP_API_HOST
        sync: false
